---
services:

  unbound:
    image: klutchell/unbound:latest
    container_name: unbound
    restart: unless-stopped
    network_mode: host  # listens on 127.0.0.1:5335
    volumes:
      - ./unbound:/etc/unbound/custom.conf.d

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host  # listens on host's port 53, no bridge overhead
    depends_on:
      unbound:
        condition: service_started
    environment:
      TZ: "Europe/Budapest"
      # FTLCONF_webserver_api_password intentionally omitted - set via:
      # docker exec pihole pihole setpassword
      FTLCONF_webserver_port: "8082,8443s"
      FTLCONF_dns_upstreams: "127.0.0.1#5335"  # unbound is on localhost with host networking
      FTLCONF_dns_listeningMode: "LOCAL"
      FTLCONF_dns_bogusPriv: "true"
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    # no ports: section needed - host network mode uses host ports directly
